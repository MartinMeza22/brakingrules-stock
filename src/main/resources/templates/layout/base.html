    .ts-dropdown{

    .ts-dropdown .option{

<body>

<div th:replace="fragments/header :: header"></div>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">
    <div th:replace="${content}"></div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script>

    document.addEventListener("DOMContentLoaded", function () {

        const tablas = document.querySelectorAll(".tabla-buscable");

        tablas.forEach(tabla => {

            const input = tabla.parentElement.querySelector(".buscador-tabla");
            if (!input) return;

            const filas = tabla.querySelectorAll("tbody tr");

            input.addEventListener("keyup", function () {

                const filtro = input.value.toLowerCase();

                filas.forEach(fila => {

                    const textoOriginal = fila.textContent.toLowerCase();

                    if (textoOriginal.includes(filtro)) {

                        fila.style.display = "";
                        fila.style.transition = "all 0.2s ease";

                        if (filtro.length > 0) {
                            fila.classList.add("fila-encontrada");
                        } else {
                            fila.classList.remove("fila-encontrada");
                        }

                    } else {

                        fila.style.display = "none";

                    }

                });

            });

        });

    });

</script>
</body>
