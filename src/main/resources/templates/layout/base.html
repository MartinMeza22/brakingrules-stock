<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content, titulo)">

<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Breaking Rules Stock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #e5e7eb;
            --accent: #9ca3af;
            --border: #334155;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            font-family: Inter, system-ui, sans-serif;
            background: var(--bg);
            color: var(--primary);
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,.35);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .card h3{
            margin-top:0;
            font-size:18px;
            font-weight:600;
        }

        input,
        select,
        textarea {

            width:100%;
            padding:10px 14px;

            margin-bottom:12px;

            background:#020617;

            border:1px solid var(--border);

            border-radius:8px;

            color:white;

            font-size:14px;

            transition:all .2s ease;

        }

        input:focus,
        select:focus,
        textarea:focus{

            outline:none;

            border-color:#3b82f6;

            box-shadow:0 0 0 2px rgba(59,130,246,0.25);

        }

        select{

            cursor:pointer;

        }

        button{
            background:#3b82f6;
            color:white;
            border:none;
            padding:10px 16px;
            border-radius:8px;
            font-weight:600;
            cursor:pointer;
            transition:all .2s ease;
        }

        button:hover{
            background:#2563eb;
        }

        a{
            color:#60a5fa;
            text-decoration:none;
            font-weight:500;
        }

        a:hover{
            text-decoration:underline;
        }


        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-size: .8rem;
            text-transform: uppercase;
            color: var(--accent);
        }

        footer {
            text-align: center;
            color: var(--accent);
            font-size: .8rem;
            padding: 20px;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }

        .btn-accion{

            background:#3b82f6;
            color:white;

            padding:10px 18px;

            border-radius:6px;

            font-weight:bold;

            font-size:14px;

            border:none;

            cursor:pointer;

        }

        .btn-accion:hover{

            background:#2563eb;

        }

        .btn-finalizar{

            background:#16a34a;
            color:white;

            padding:12px 22px;

            font-weight:bold;

            border:none;

            border-radius:6px;

            cursor:pointer;

            font-size:16px;

        }

        .btn-finalizar:hover{

            background:#15803d;

        }

        .buscador {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;

            border-radius: 6px;
            border: 1px solid #ccc;

            font-size: 14px;
        }

        .fila-encontrada{
            background: rgba(59,130,246,0.15);
            border-left:4px solid #3b82f6;
            transition:all 0.25s ease;
        }

        .fila-encontrada:hover{
            background: rgba(59,130,246,0.25);
        }

        .buscador-tabla{
            width:100%;
            padding:10px 14px;

            margin-bottom:15px;

            border-radius:8px;

            border:1px solid var(--border);

            background:#020617;

            color:white;

            font-size:14px;

            transition:all 0.2s ease;
        }

        .buscador-tabla:focus{
            outline:none;
            border-color:#3b82f6;
            box-shadow:0 0 0 2px rgba(59,130,246,0.25);
        }

        tbody tr{
            transition:all .15s ease;
        }

        tbody tr:hover{
            background: rgba(255,255,255,0.04);
        }

        .error{
            color:#ff4d4d;
            font-size:13px;
            margin-top:4px;
        }

        .alert-error{
            background:#2a1a1a;
            border:1px solid #ff4d4d;
            color:#ff8080;
            padding:10px;
            margin-bottom:10px;
        }

        .navbar{

            width:100%;

            background:#0b1220;

            border-bottom:1px solid var(--border);

        }

        .navbar-container{

            max-width:1200px;

            margin:auto;

            padding:12px 20px;

            display:flex;

            gap:18px;

            align-items:center;

        }

        .nav-item{

            color:#9ca3af;

            text-decoration:none;

            font-weight:500;

            padding:6px 10px;

            border-radius:6px;

            transition:all .2s ease;

        }

        .nav-item:hover{

            background:rgba(59,130,246,0.15);

            color:#e5e7eb;

        }

        .nav-dashboard{

            margin-left:auto;

            background:#3b82f6;

            color:white;

        }

        .nav-dashboard:hover{

            background:#2563eb;

        }

        .header{

            background:#020617;

            border-bottom:1px solid var(--border);

        }

        .header-container{

            max-width:1200px;

            margin:auto;

            padding:18px 20px;

            display:flex;

            align-items:center;

        }

        .logo-link{

            display:flex;

            align-items:center;

            gap:12px;

            text-decoration:none;

            color:white;

        }

        .logo{

            height:42px;

        }

        .logo-link h2{

            margin:0;

            font-size:20px;

            font-weight:600;

        }
        .dashboard-grid{

            display:grid;

            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

            gap:16px;

            margin-bottom:20px;

            }

            .stat-card{

            background:#020617;

            border:1px solid #334155;

            border-radius:10px;

            padding:16px;

            transition:all .2s ease;

            }

            .stat-card:hover{

            border-color:#3b82f6;

            transform:translateY(-2px);

            }

            .stat-card h4{

            margin:0;

            font-size:13px;

            color:#9ca3af;

            }

            .stat-card p{

            font-size:22px;

            margin-top:6px;

            font-weight:bold;

            }
    </style>
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">
    <div th:replace="${content}"></div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script>

    document.addEventListener("DOMContentLoaded", function () {

        const tablas = document.querySelectorAll(".tabla-buscable");

        tablas.forEach(tabla => {

            const input = tabla.parentElement.querySelector(".buscador-tabla");
            if (!input) return;

            const filas = tabla.querySelectorAll("tbody tr");

            input.addEventListener("keyup", function () {

                const filtro = input.value.toLowerCase();

                filas.forEach(fila => {

                    const textoOriginal = fila.textContent.toLowerCase();

                    if (textoOriginal.includes(filtro)) {

                        fila.style.display = "";
                        fila.style.transition = "all 0.2s ease";

                        if (filtro.length > 0) {
                            fila.classList.add("fila-encontrada");
                        } else {
                            fila.classList.remove("fila-encontrada");
                        }

                    } else {

                        fila.style.display = "none";

                    }

                });

            });

        });

    });

</script>
</body>
</html>
