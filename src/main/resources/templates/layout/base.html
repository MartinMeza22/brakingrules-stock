<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content, titulo)">

<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Breaking Rules Stock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #e5e7eb;
            --accent: #9ca3af;
            --border: #334155;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            font-family: Inter, system-ui, sans-serif;
            background: var(--bg);
            color: var(--primary);
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,.35);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #020617;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
        }

        button {
            background: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-size: .8rem;
            text-transform: uppercase;
            color: var(--accent);
        }

        footer {
            text-align: center;
            color: var(--accent);
            font-size: .8rem;
            padding: 20px;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }
    </style>
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">
    <div th:replace="${content}"></div>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
