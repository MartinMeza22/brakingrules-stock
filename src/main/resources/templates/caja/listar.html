<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::section}, 'Caja')">

    <section>
    <div class="card">
            <h3>Movimientos de Caja</h3>
            <input class="buscador-tabla" placeholder="Buscar...">
            <table class="tabla-buscable" style="width:100%; border-collapse: collapse; font-family: Arial;">
                <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Tipo</th>
                    <th>Monto</th>
                    <th>Referencia</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${movimientos}">
                    <td th:text="${#temporals.format(m.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${m.tipo}"></td>
                    <td th:text="${m.monto}"></td>
                    <td th:text="${m.referencia}"></td>
                </tr>
                </tbody>
            </table>
    </div>

    </section>

</html>
