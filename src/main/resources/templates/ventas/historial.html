<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::section}, 'Ventas')">
<section>

    <div class="card">

        <h3>📄 Historial de Ventas</h3>
        <input class="buscador-tabla" placeholder="Buscar...">
        <table class="tabla-buscable" th:if="${!ventas.isEmpty()}">

            <thead>
            <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Cliente</th>
                <th>Total</th>
                <th>Estado</th>
                <th></th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="v : ${ventas}">

                <td th:text="${v.id}"></td>

                <td th:text="${#temporals.format(v.fecha,'dd/MM/yyyy HH:mm')}"></td>

                <td th:text="${v.cliente.nombre}"></td>

                <td th:text="${v.total}"></td>

                <td th:text="${v.estado}"></td>

                <td>

                    <a class="btn-accion"
                       th:href="@{'/web/ventas/' + ${v.id}}">

                        Ver

                    </a>

                    <a class="btn-remito"
                       th:href="@{'/web/ventas/remito/' + ${v.id}}">

                        Remito

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</section>
