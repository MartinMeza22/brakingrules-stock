<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::section}, 'Ventas')">

<section>

    <div class="card">

        <h3>🧾 Nueva Venta</h3>

        <form th:action="@{/web/ventas/crear}" method="post">

            <select name="clienteId" id="clienteSelect">

                <option th:value="${clientePublico.id}" selected>
                    Consumidor Final
                </option>

                <option disabled>------------------------</option>

                <option th:each="c : ${mayoristas}"
                        th:value="${c.id}"
                        th:text="${c.nombre + ' ' + c.apellido}">
                </option>

            </select>

            <button class="btn-accion" type="submit">
                Crear Venta
            </button>

            <a th:href="@{/web/ventas/historial}"
               style="margin-right:15px;color:#9ca3af;text-decoration:none;">
                Ir al historial
            </a>

        </form>

    </div>

    <style>
        #clienteSelect{
            display:none;
        }
        .item{
            padding:8px 10px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            new TomSelect("#clienteSelect",{
                create:false,
                sortField:{
                    field:"text",
                    direction:"asc"
                },
                openOnFocus:true
            });

        });
    </script>

</section>

</html>
