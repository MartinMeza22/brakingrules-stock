<section>

    <div class="card">

        <h3>Ventas</h3>

        <input id="buscadorVentas" placeholder="🔎 Buscar venta">

        <table id="tablaVentas">

            <thead>
            <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Fecha</th>
                <th>Total</th>
                <th></th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="v : ${ventas}">

                <td th:text="${v.id}"></td>

                <td th:text="${v.cliente.nombre + ' ' + v.cliente.apellido}"></td>

                <td th:text="${#temporals.format(v.fecha,'dd/MM/yyyy HH:mm')}"></td>

                <td th:text="${v.total}"></td>

                <td>

                    <a th:href="@{'/web/ventas/' + ${v.id}}">
                        Ver detalle
                    </a>

                    <a th:href="@{'/web/ventas/remito/' + ${v.id}}">
                        Imprimir
                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</section>

<script>
    activarBuscador("buscadorVentas","tablaVentas");
</script>
