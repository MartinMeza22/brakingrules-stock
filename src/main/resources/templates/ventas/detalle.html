<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::section}, 'Detalle Venta')">

<section>
    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <div class="card venta-card">
        <div class="badge-precio"
             th:classappend="${venta.cliente.tipoCliente.name() == 'MAYORISTA'} ? ' mayorista' : ' publico'"
             th:text="${venta.cliente.tipoCliente.name() == 'MAYORISTA'} ? 'P.M' : 'P.P'">
        </div>

        <h3 th:text="'Venta #' + ${venta.id}"></h3>

        <p>
            Cliente:
            <span th:text="${venta.nombreClienteMostrar}"></span>
        </p>
    </div>

    <div class="card">
        <h3>➕ Agregar Producto</h3>

        <form th:action="@{/web/ventas/agregar-producto}" method="post" id="formAgregarProducto">

            <input type="hidden" name="ventaId" th:value="${venta.id}"/>

            <div class="campo">

                <label>Buscar producto</label>
                <input type="text" id="buscarProducto" placeholder="Buscar producto...">

                <label style="margin-top:10px;">Producto *</label>
                <select name="varianteId" id="varianteSelect" size="8" class="select-cliente">

                    <option value="">Seleccionar producto</option>

                    <option th:each="v : ${variantes}"
                            th:value="${v.id}"
                            th:text="${v.producto.nombre + ' - ' + v.color + ' - ' + v.talle + ' (Stock: ' + v.stock + ')'}">
                    </option>

                </select>

                <div id="errorVariante" class="error-text"></div>

            </div>

            <input type="number"
                   name="cantidad"
                   id="cantidad"
                   placeholder="Cantidad"
                   min="1"/>

            <div id="errorCantidad" class="error-text"></div>

            <button class="btn-accion" type="submit">
                Agregar
            </button>
        </form>

        <div class="card">
            <h3>Productos en la venta</h3>

            <table th:if="${!detalles.isEmpty()}">
                <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                    <th>Subtotal</th>
                    <th>Acción</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="d : ${detalles}">
                    <td th:text="${d.variante.producto.nombre + ' ' + d.variante.color + ' ' + d.variante.talle}"></td>
                    <td th:text="${d.cantidad}"></td>
                    <td th:text="${d.precioUnitario}"></td>
                    <td th:text="${d.subtotal}"></td>

                    <td>
                        <form th:action="@{/web/ventas/eliminar-producto}" method="post"
                              onsubmit="return confirm('¿Eliminar producto de la venta?')">

                            <input type="hidden" name="ventaId" th:value="${venta.id}" />
                            <input type="hidden" name="detalleId" th:value="${d.id}" />

                            <button type="submit" class="btn-eliminar icon-only">🗑</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <p>
                Total:
                <span id="totalOriginal" th:text="${venta.total}"></span>
            </p>

            <p>
                Total con descuento:
                <span id="totalConDescuento">0</span>
            </p>

            <form th:action="@{/web/ventas/finalizar}" method="post">
                <input type="hidden" name="ventaId" th:value="${venta.id}"/>

                <label>Descuento (%)</label>

                <input type="number"
                       id="descuento"
                       name="descuento"
                       step="0.01"
                       min="0"
                       max="100"
                       placeholder="0">

                <button class="btn-finalizar"
                        th:disabled="${detalles.isEmpty()}">
                    Finalizar Venta
                </button>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function(){

            const buscar = document.getElementById("buscarProducto");
            const select = document.getElementById("varianteSelect");

            const cantidadInput = document.getElementById("cantidad");
            const form = document.getElementById("formAgregarProducto");

            const errorVariante = document.getElementById("errorVariante");
            const errorCantidad = document.getElementById("errorCantidad");

            const descuentoInput = document.getElementById("descuento");
            const totalOriginalEl = document.getElementById("totalOriginal");
            const totalConDescuento = document.getElementById("totalConDescuento");

            const ventaId = /*[[${venta.id}]]*/ 0;

            buscar.addEventListener("input", function(){
                const filtro = buscar.value.toLowerCase();

                Array.from(select.options).forEach(option => {
                    const texto = option.text.toLowerCase();

                    if (!option.value) return;

                    option.style.display = texto.includes(filtro) ? "block" : "none";
                });
            });

            if (totalOriginalEl && descuentoInput) {
                const totalOriginal = parseFloat(totalOriginalEl.innerText);

                descuentoInput.addEventListener("input", function(){
                    let descuento = parseFloat(this.value) || 0;
                    let totalFinal = totalOriginal - (totalOriginal * (descuento / 100));
                    totalConDescuento.innerText = totalFinal.toFixed(2);
                });
            }

            form.addEventListener("submit", function(e){

                let hayError = false;

                errorVariante.innerText = "";
                errorCantidad.innerText = "";

                if(!select.value){
                    errorVariante.innerText = "Seleccioná un producto";
                    hayError = true;
                }

                if(!cantidadInput.value || cantidadInput.value <= 0){
                    errorCantidad.innerText = "Ingresá una cantidad válida";
                    hayError = true;
                }

                if(hayError){
                    e.preventDefault();
                }
            });

            let ventaFinalizada = false;

            document.querySelector(".btn-finalizar")?.addEventListener("click", function () {
                ventaFinalizada = true;
            });

            window.addEventListener("beforeunload", function () {

                const tieneProductos = document.querySelectorAll("tbody tr").length > 0;

                if (!tieneProductos && !ventaFinalizada) {
                    navigator.sendBeacon("/web/ventas/cancelar?ventaId=" + ventaId);
                }
            });

        });
    </script>

    <style>
        #buscarProducto{
            width:100%;
            padding:8px;
            margin-bottom:8px;
        }

        #varianteSelect{
            width:100%;
        }
    </style>

</section>
</html>
