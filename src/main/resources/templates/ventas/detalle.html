<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::section}, 'Detalle Venta')">

<section>

    <div class="card">

        <h3 th:text="'Venta #' + ${venta.id}"></h3>

        <p>
            Cliente:
            <span th:text="${venta.cliente.nombre}"></span>
        </p>

        <p>
            Tipo de precio:
            <span th:text="${venta.cliente.tipoCliente}"></span>
        </p>

        <p>
            Total:
            <span id="totalOriginal" th:text="${venta.total}"></span>
        </p>

        <p>
            Total con descuento:
            <span id="totalConDescuento">0</span>
        </p>

        <form th:action="@{/web/ventas/finalizar}" method="post">

            <input type="hidden" name="ventaId" th:value="${venta.id}"/>

            <label>Descuento (%)</label>

            <input type="number"
                   id="descuento"
                   name="descuento"
                   step="0.01"
                   min="0"
                   max="100"
                   placeholder="0">

            <button class="btn-finalizar">
                Finalizar Venta
            </button>

        </form>
    </div>

    <div class="card">

        <h3>➕ Agregar Producto</h3>

        <form th:action="@{/web/ventas/agregar-producto}" method="post">

            <input type="hidden" name="ventaId" th:value="${venta.id}"/>

            <select name="varianteId">

                <option value="">Seleccionar producto</option>

                <option th:each="v : ${variantes}"
                        th:value="${v.id}"
                        th:text="${v.producto.nombre + ' - ' + v.color + ' - ' + v.talle}">
                </option>

            </select>

            <input type="number" name="cantidad" placeholder="Cantidad"/>

            <button class="btn-accion" type="submit">
                Agregar
            </button>

        </form>

    </div>


    <div class="card">

        <h3>Productos en la venta</h3>

        <table th:if="${!detalles.isEmpty()}">

            <thead>
            <tr>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Precio</th>
                <th>Subtotal</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="d : ${detalles}">

                <td th:text="${d.variante.producto.nombre + ' ' + d.variante.color + ' ' + d.variante.talle}"></td>

                <td th:text="${d.cantidad}"></td>

                <td th:text="${d.precioUnitario}"></td>

                <td th:text="${d.subtotal}"></td>

            </tr>

            </tbody>

        </table>

    </div>

    <script>

        const totalOriginal = parseFloat(document.getElementById("totalOriginal").innerText);
        const descuentoInput = document.getElementById("descuento");
        const totalConDescuento = document.getElementById("totalConDescuento");

        function calcularTotal(){
            let descuento = parseFloat(descuentoInput.value) || 0;

            let montoDescuento = totalOriginal * (descuento / 100);
            let totalFinal = totalOriginal - montoDescuento;

            totalConDescuento.innerText = totalFinal.toFixed(2);
        }

        descuentoInput.addEventListener("input", calcularTotal);

    </script>

</section>

</html>
