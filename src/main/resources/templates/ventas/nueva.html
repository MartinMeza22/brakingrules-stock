<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::section}, 'Nueva Venta')">

<section>

    <div class="card">

        <h3>Nueva Venta</h3>

        <a th:href="@{/web/ventas/listar}" class="button">
            ← Volver al listado
        </a>

        <div th:if="${success}" class="success">¡Venta cargada correctamente!</div>
        <div th:if="${error}" class="error" th:text="${error}"></div>

        <form th:action="@{/web/ventas/guardar}" th:object="${venta}" method="post">

            <div th:if="${#fields.hasErrors('*')}" class="error">
                Hay errores en el formulario
            </div>

            <label>Cliente</label>
            <select th:field="*{clienteId}" required>
                <option value="">Seleccione cliente</option>
                <option th:each="c : ${clientes}"
                        th:value="${c.id}"
                        th:text="${c.nombre + ' ' + c.apellido}">
                </option>
            </select>

            <label>Forma de pago</label>
            <select th:field="*{formaPago}" required>
                <option value="">Seleccione</option>
                <option value="EFECTIVO">Efectivo</option>
                <option value="TRANSFERENCIA">Transferencia</option>
                <option value="TARJETA">Tarjeta</option>
            </select>

            <label>Monto abonado</label>
            <input type="number" step="0.01" th:field="*{montoPagado}" />

            <h4>Productos</h4>

            <table id="tablaProductos">
                <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                    <th>Subtotal</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td>
                        <select name="items[0].productoId" onchange="actualizarPrecio(this)" required>
                            <option value="">Seleccione producto</option>
                            <option th:each="p : ${productos}"
                                    th:value="${p.id}"
                                    th:text="${p.nombre}"
                                    th:data-precio="${p.precioVenta}">
                            </option>
                        </select>
                    </td>
                    <td>
                        <input type="number" name="items[0].cantidad" min="1" value="1"
                               onchange="calcularSubtotal(this)" />
                    </td>
                    <td><input type="number" name="items[0].precioUnitario" readonly /></td>
                    <td><input type="number" name="items[0].subtotal" class="subtotal" readonly /></td>
                    <td><button type="button" onclick="eliminarFila(this)">Eliminar</button></td>
                </tr>
                </tbody>
            </table>

            <h4>Total: $<span id="totalVenta">0.00</span></h4>

            <button type="button" onclick="agregarFila()">Agregar producto</button>
            <button type="submit">Confirmar Venta</button>

        </form>
    </div>

    <!-- 🔥 IMPORTANTE: EL SCRIPT DENTRO DEL SECTION -->
    <script>
        function agregarFila() {
            let tabla = document.querySelector('#tablaProductos tbody');
            let index = tabla.rows.length;

            let fila = document.createElement('tr');

            fila.innerHTML = `
                <td>
                    <select name="items[${index}].productoId" onchange="actualizarPrecio(this)" required>
                        ${document.querySelector('#tablaProductos tbody tr:first-child select').innerHTML}
                    </select>
                </td>
                <td><input type="number" name="items[${index}].cantidad" min="1" value="1" onchange="calcularSubtotal(this)" /></td>
                <td><input type="number" name="items[${index}].precioUnitario" readonly /></td>
                <td><input type="number" name="items[${index}].subtotal" class="subtotal" readonly /></td>
                <td><button type="button" onclick="eliminarFila(this)">Eliminar</button></td>
            `;
            tabla.appendChild(fila);
        }

        function eliminarFila(btn) {
            btn.closest('tr').remove();
            calcularTotal();
        }

        function actualizarPrecio(select) {
            let precio = parseFloat(select.options[select.selectedIndex].dataset.precio || 0);
            let row = select.closest('tr');

            let cantidad = row.querySelector('input[name*="cantidad"]').value || 0;
            row.querySelector('input[name*="precioUnitario"]').value = precio.toFixed(2);
            row.querySelector('input[name*="subtotal"]').value = (precio * cantidad).toFixed(2);

            calcularTotal();
        }

        function calcularSubtotal(input) {
            let row = input.closest('tr');
            let cantidad = parseFloat(input.value || 0);
            let precio = parseFloat(row.querySelector('input[name*="precioUnitario"]').value || 0);
            row.querySelector('input[name*="subtotal"]').value = (cantidad * precio).toFixed(2);
            calcularTotal();
        }

        function calcularTotal() {
            let total = 0;
            document.querySelectorAll('.subtotal').forEach(s => total += parseFloat(s.value || 0));
            document.getElementById('totalVenta').innerText = total.toFixed(2);
        }
    </script>

</section>
</html>
