<section>

    <div class="card">

        <h2>Venta #<span th:text="${venta.id}"></span></h2>

        <p>
            Cliente:
            <b th:text="${venta.cliente.nombre + ' ' + venta.cliente.apellido}"></b>
        </p>

        <p>
            Fecha:
            <span th:text="${#temporals.format(venta.fecha,'dd/MM/yyyy HH:mm')}"></span>
        </p>

        <table>

            <thead>
            <tr>
                <th>Producto</th>
                <th>Color</th>
                <th>Talle</th>
                <th>Cantidad</th>
                <th>Precio</th>
                <th>Subtotal</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="d : ${detalles}">

                <td th:text="${d.variante.producto.nombre}"></td>

                <td th:text="${d.variante.color}"></td>

                <td th:text="${d.variante.talle}"></td>

                <td th:text="${d.cantidad}"></td>

                <td th:text="${d.precioUnitario}"></td>

                <td th:text="${d.subtotal}"></td>

            </tr>

            </tbody>

        </table>

        <h3>Total: $<span th:text="${venta.total}"></span></h3>

    </div>

</section>
