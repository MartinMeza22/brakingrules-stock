<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::section}, 'Variante')">

    <section>
        <form th:action="@{'/web/variantes/actualizar/' + ${variante.id}}"
              th:object="${variante}"
              method="post">

            <label>Color</label>
            <select th:field="*{color}">
                <option th:each="c : ${colores}"
                        th:value="${c}"
                        th:text="${c}">
                </option>
            </select>

            <label>Talle</label>
            <select th:field="*{talle}">
                <option th:each="t : ${talles}"
                        th:value="${t}"
                        th:text="${t}">
                </option>
            </select>

            <label>Stock</label>
            <input type="number"
                   min="0"
                   th:field="*{stock}"
                   placeholder="Stock"/>

            <button type="submit">Guardar</button>

        </form>

    </section>

</html>
