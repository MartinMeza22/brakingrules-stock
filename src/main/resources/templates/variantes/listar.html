<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section}, 'Variantes')}">

<section>

    <div class="card">
        <h3 th:text="'➕ Nueva variante para: ' + ${producto.nombre}"></h3>

        <form th:action="@{'/web/variantes/guardar-multiple/' + ${producto.id}}"
              method="post">

            <select name="color" id="colorSelect">

                <option value="">Color</option>

                <option th:each="c : ${T(com.breakingrules.stock.productos.entity.Color).values()}"
                        th:value="${c}"
                        th:text="${c}">
                </option>

            </select>

            <div id="tallesContainer" style="display:none">

                <table>
                    <tr>
                        <th>Talle</th>
                        <th>Crear/Agregar</th>
                        <th>Stock</th>
                    </tr>

                    <tr th:each="t : ${talles}">

                        <td th:text="${t}"></td>

                        <td>
                            <input type="checkbox"
                                   name="tallesSeleccionados"
                                   th:value="${t}">
                        </td>

                        <td>
                            <input type="number"
                                   th:name="'stock[' + ${t} + ']'"
                                   placeholder="Stock">
                        </td>

                    </tr>

                </table>

            </div>

            <button type="submit">Guardar variantes</button>

        </form>

    </div>


    <div class="card">
        <h3>Variantes</h3>

        <input class="buscador-tabla" placeholder="Buscar...">

        <div th:if="${variantes.?[stock <= 3].size() > 0}" class="alert-stock">
            ⚠ Variantes con stock crítico
        </div>
        <table class="tabla-buscable" th:if="${!variantes.isEmpty()}">

            <thead>
            <tr>
                <th>Color</th>
                <th>Talle</th>
                <th>Precio Público</th>
                <th>Precio Mayorista</th>
                <th>Stock</th>
                <th>Código</th>
                <th style="text-align:center">Barcode</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="v : ${variantes}">

                <td th:text="${v.color}"></td>

                <td th:text="${v.talle}"></td>

                <td>
                    <div th:text="${v.precioPublicoFinal}"></div>

                    <small style="color:orange"
                           th:if="${v.usaPrecioHeredado}">
                        ⚠ Usa precio del talle anterior
                    </small>
                </td>

                <td>
                    <div th:text="${v.precioMayoristaFinal}"></div>

                    <small style="color:orange"
                           th:if="${v.usaPrecioHeredado}">
                        ⚠ Usa precio del talle anterior
                    </small>
                </td>

                <td>

                <span class="stock-indicador"
                      th:classappend="
                        ${v.stock <= 3} ? 'critico' :
                        (${v.stock <= 10} ? 'bajo' : 'ok')">
                </span>

                <span th:text="${v.stock}"></span>

                </td>

                <td>
                    <div style="display:flex; flex-direction:column; align-items:center;">

                        <img th:src="@{'/web/productos/barcode/' + ${v.codigoBarras}}"
                             alt="barcode"
                             style="width:160px; height:auto;" />

                        <span style="font-size:12px;margin-top:4px;letter-spacing:2px;font-family:monospace;font-weight:bold;"
                              th:text="${v.codigoBarras}">
                        </span>

                    </div>
                </td>

                <td>

                    <div th:if="${error}" style="color:red">
                        <p th:text="${error}"></p>
                    </div>

                    <form th:action="@{/web/variantes/ingresar-stock}" method="post" style="display:inline">

                        <input type="hidden" name="varianteId" th:value="${v.id}" />

                        <input type="number" name="cantidad" placeholder="+ stock" style="width:80px"/>

                        <button type="submit" class="btn-mas">➕</button>

                    </form>

                </td>

                <td>

                    <a th:href="@{'/web/productos/etiqueta/' + ${v.id}}">
                        Imprimir etiqueta
                    </a>

                    <a th:href="@{'/web/variantes/editar/' + ${v.id}}">
                        Editar
                    </a>

                    <a th:href="@{'/web/variantes/eliminar/' + ${v.id} + '/' + ${producto.id}}">
                        Eliminar
                    </a>

                </td>

            </tr>

            </tbody>

        </table>

        <a th:href="@{/web/productos}">
            ← Volver a productos
        </a>

    </div>

    <script>

        document.addEventListener("DOMContentLoaded", function(){

            const colorSelect = document.getElementById("colorSelect");
            const talles = document.getElementById("tallesContainer");

            if(!colorSelect) return;

            colorSelect.addEventListener("change", function(){

                if(this.value){
                    talles.style.display = "block";
                }else{
                    talles.style.display = "none";
                }

            });

        });

    </script>

</section>

</html>
