<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::section}, 'Editar producto')}">

<section>

    <div class="card">
        <h3>✏️ Editar producto</h3>

        <form th:action="@{/web/productos/actualizar/{id}(id=${producto.id})}"
              th:object="${producto}"
              method="post">

            <div th:if="${#fields.hasErrors('*')}" class="alert-error">
                Hay errores en el formulario. Revisá los campos.
            </div>

            <div class="error"
                 th:if="${#fields.hasGlobalErrors()}"
                 th:each="err : ${#fields.globalErrors()}"
                 th:text="${err}">
            </div>

            <input type="hidden" th:field="*{id}"/>

            <label>Artículo</label>
            <input th:field="*{sku}" readonly/>

            <label>Nombre</label>
            <input th:field="*{nombre}" placeholder="Nombre"/>
            <div class="error"
                 th:if="${#fields.hasErrors('nombre')}"
                 th:errors="*{nombre}">
            </div>


            <h4>Precios Base (S a XL)</h4>

            <label>Precio Público</label>
            <input type="number" step="0.01"
                   th:field="*{precioBasePublico}"
                   placeholder="Precio Público"/>

            <div class="error"
                 th:if="${#fields.hasErrors('precioBasePublico')}"
                 th:errors="*{precioBasePublico}">
            </div>

            <label>Precio Mayorista</label>
            <input type="number" step="0.01"
                   th:field="*{precioBaseMayorista}"
                   placeholder="Precio Mayorista"/>

            <div class="error"
                 th:if="${#fields.hasErrors('precioBaseMayorista')}"
                 th:errors="*{precioBaseMayorista}">
            </div>


            <h4>Precios XXL / XXXL</h4>

            <label>Precio Público</label>
            <input type="number" step="0.01"
                   th:field="*{precioEspecial1Publico}"
                   placeholder="Precio Público XXL"/>

            <label>Precio Mayorista</label>
            <input type="number" step="0.01"
                   th:field="*{precioEspecial1Mayorista}"
                   placeholder="Precio Mayorista XXL"/>


            <h4>Precio XXXXL</h4>

            <label>Precio Público</label>
            <input type="number" step="0.01"
                   th:field="*{precioEspecial2Publico}"
                   placeholder="Precio Público XXXXL"/>

            <label>Precio Mayorista</label>
            <input type="number" step="0.01"
                   th:field="*{precioEspecial2Mayorista}"
                   placeholder="Precio Mayorista XXXXL"/>


            <h4>Precios XXXXXL / XXXXXXL</h4>

            <label>Precio Público</label>
            <input type="number" step="0.01"
                   th:field="*{precioEspecial3Publico}"
                   placeholder="Precio Público XXXXXL"/>

            <label>Precio Mayorista</label>
            <input type="number" step="0.01"
                   th:field="*{precioEspecial3Mayorista}"
                   placeholder="Precio Mayorista XXXXXL"/>


            <label>Proveedor</label>
            <select th:field="*{proveedor}">
                <option value="">Proveedor</option>
                <option th:each="prov : ${proveedores}"
                        th:value="${prov.id}"
                        th:text="${prov.nombre}">
                </option>
            </select>

            <button type="submit">Guardar cambios</button>

        </form>

    </div>

</section>
</html>
