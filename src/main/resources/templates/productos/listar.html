<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::section}, 'Productos')">

<section>

    <div class="card">
        <h3>➕ Nuevo producto</h3>


        <form th:action="@{/web/productos/guardar}"
              th:object="${productoNuevo}"
              method="post">

            <div th:if="${#fields.hasErrors('*')}" class="alert-error">
                Hay errores en el formulario. Revisá los campos.
            </div>

            <div class="error"
                 th:if="${#fields.hasGlobalErrors()}"
                 th:each="err : ${#fields.globalErrors()}"
                 th:text="${err}">
            </div>

            <input th:field="*{sku}" placeholder="Articulo"/>

            <div class="error"
                 th:if="${#fields.hasErrors('sku')}"
                 th:errors="*{sku}">
            </div>

            <input th:field="*{nombre}" placeholder="Nombre"/>

            <div class="error"
                 th:if="${#fields.hasErrors('nombre')}"
                 th:errors="*{nombre}">
            </div>


            <input type="number" step="0.01"
                   th:field="*{precioVentaPublico}"
                   placeholder="Precio Público"/>

            <div class="error"
                 th:if="${#fields.hasErrors('precioVentaPublico')}"
                 th:errors="*{precioVentaPublico}">
            </div>


            <input type="number" step="0.01"
                   th:field="*{precioVentaMayorista}"
                   placeholder="Precio Mayorista"/>

            <div class="error"
                 th:if="${#fields.hasErrors('precioVentaMayorista')}"
                 th:errors="*{precioVentaMayorista}">
            </div>

            <select name="proveedorId">
                <option value="">Sin proveedor</option>

                <option th:each="prov : ${proveedores}"
                        th:value="${prov.id}"
                        th:text="${prov.nombre}">
                </option>
            </select>
            <button type="submit">Guardar</button>
        </form>

    </div>

    <div class="card">
        <h3>Productos</h3>
        <input class="buscador-tabla" placeholder="Buscar...">
        <table class="tabla-buscable" th:if="${!productos.isEmpty()}">
            <thead>
            <tr>
                <th>Articulo</th>
                <th>Nombre</th>
                <th>Precio Publico</th>
                <th>Precio Mayorista</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.sku}"></td>
                <td th:text="${p.nombre}"></td>
                <td th:text="${p.precioVentaPublico}"></td>
                <td th:text="${p.precioVentaMayorista}"></td>
                <td>
                    <a th:href="@{'/web/variantes/' + ${p.id}}">Ver variantes</a>
                    <a th:href="@{'/web/productos/editar/' + ${p.id}}">Editar</a>
                    <a th:href="@{'/web/productos/eliminar/' + ${p.id}}">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>

    </div>

</section>
</html>
