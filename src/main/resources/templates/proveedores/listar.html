<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::section}, 'Proveedores')">

<section>

    <div class="card">
        <h3>➕ Nuevo proveedor</h3>

        <form th:action="@{/web/proveedores/guardar}"
              th:object="${proveedorNuevo}"
              method="post">

            <label>Nombre *</label>
            <input th:field="*{nombre}" placeholder="Nombre"/>
            <div th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>

            <label>Descripción</label>
            <input th:field="*{descripcion}" placeholder="Descripcion"/>
            <div th:if="${#fields.hasErrors('cuit')}" th:errors="*{descripcion}"></div>

            <label>DNI / CUIT *</label>
            <input th:field="*{cuit}" placeholder="CUIT"/>
            <div th:if="${#fields.hasErrors('cuit')}" th:errors="*{cuit}"></div>

            <label>Email *</label>
            <input th:field="*{email}" placeholder="Email"/>
            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

            <label>Telefono *</label>
            <input th:field="*{telefono}" placeholder="Teléfono"/>
            <div th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>

            <label>Dirección</label>
            <input th:field="*{direccion}" placeholder="Dirección"/>
            <div th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></div>

            <button type="submit">Guardar</button>
        </form>
    </div>

    <div class="card">
        <h3>Proveedores</h3>

        <input class="buscador-tabla" placeholder="Buscar...">
        <table class="tabla-buscable" th:if="${!proveedores.isEmpty()}">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Descripcion</th>
                <th>CUIT</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Dirección</th>
                <th></th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="p : ${proveedores}">
                <td th:text="${p.nombre}"></td>
                <td th:text="${p.descripcion}"></td>
                <td th:text="${p.cuit}"></td>
                <td th:text="${p.email}"></td>
                <td th:text="${p.telefono}"></td>
                <td th:text="${p.direccion}"></td>
                <td class="acciones">
                    <a class="btn btn-editar"
                       th:href="@{'/web/proveedores/editar/' + ${p.id}}">
                        Editar
                    </a>

                    <a class="btn btn-eliminar"
                       th:href="@{'/web/proveedores/eliminar/' + ${p.id}}"
                       onclick="return confirm('¿Seguro que querés eliminar este proveedor?')">
                        Eliminar
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${proveedores.isEmpty()}">
            No hay proveedores cargados.
        </div>
    </div>

</section>
</html>
