<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::section}, 'Cuenta Detalle')">

<section>

    <div class="card">
        <h3 th:text="${cuenta.cliente != null ? 'Cuenta de ' + cuenta.cliente.nombre : 'Cuenta sin cliente'}"></h3>

        <p>
            <strong>Saldo actual:</strong>
            <span th:text="${#numbers.formatDecimal(cuenta.saldo, 1, 2)}"></span>
        </p>
    </div>

    <div class="card">
        <h3>Movimientos</h3>

        <table th:if="${!movimientos.isEmpty()}">
            <thead>
            <tr>
                <th>Fecha</th>
                <th>Tipo</th>
                <th>Origen</th>
                <th>Monto</th>
                <th>Descripción</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="m : ${movimientos}">
                <td th:text="${#temporals.format(m.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${m.tipo}"></td>
                <td th:text="${m.origen}"></td>
                <td th:text="${#numbers.formatDecimal(m.monto, 1, 2)}"></td>
                <td th:text="${m.descripcion}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h3>Registrar pago</h3>

        <form th:action="@{/web/cuentas/pago}" method="post">
            <input type="hidden" name="clienteId" th:value="${cuenta.cliente.id}"/>

            <input type="number" step="0.01" name="monto" placeholder="Monto"/>
            <input type="text" name="descripcion" placeholder="Descripción"/>

            <button type="submit">Registrar Pago</button>
        </form>
    </div>

</section>
</html>
